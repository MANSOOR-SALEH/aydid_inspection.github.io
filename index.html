<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYDID Workspace - Operator Inspection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen p-6">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h1 class="text-2xl font-bold text-slate-800">🎙️ AYDID Inspection Console</h1>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 bg-slate-100 p-4 rounded-lg">
            <div>
                <label class="block text-xs font-semibold uppercase text-slate-500 tracking-wider">Dialect Folder</label>
                <input type="text" id="dialectFolder" class="mt-1 block w-full rounded-md border-slate-300 p-2 border font-medium text-slate-700" placeholder="e.g., YEM_AD">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase text-slate-500 tracking-wider">Speaker ID</label>
                <div class="flex gap-2">
                    <input type="text" id="speakerId" class="mt-1 block w-full rounded-md border-slate-300 p-2 border font-medium text-slate-700" placeholder="e.g., YEM_AD_F001">
                    <button onclick="loadSpeakerData()" class="mt-1 bg-indigo-600 text-white px-5 py-2 rounded-md font-medium hover:bg-indigo-700 shadow-sm transition">Load Package</button>
                </div>
            </div>
        </div>

        <div id="workspace" class="hidden mt-8">
            <div class="flex justify-between items-center mb-4 bg-slate-50 p-3 rounded-lg border">
                <h2 class="text-lg font-semibold text-slate-700" id="currentSpeakerTitle">Package: </h2>
                <button onclick="saveAndCommitChanges()" class="bg-emerald-600 text-white px-6 py-2.5 rounded-lg font-medium hover:bg-emerald-700 shadow-md transition flex items-center gap-2">
                    <span>💾</span> Commit Verification
                </button>
            </div>

            <div class="overflow-x-auto border border-slate-200 rounded-xl">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">WAV File</th>
                            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Audio playback</th>
                            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Transcript Annotation Pipeline</th>
                            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Inspection Status</th>
                        </tr>
                    </thead>
                    <tbody id="annotationTableBody" class="bg-white divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- ⚙️ HARDCODED CONFIGURATION ---
        const GITHUB_TOKEN = "PASTE_YOUR_GHP_TOKEN_HERE"; // Put your token directly inside these quotes
        const REPO_OWNER = "YOUR_GITHUB_USERNAME"; 
        const REPO_NAME = "YOUR_REPO_NAME";
        const BRANCH = "main";

        let currentFileSha = ""; 
        let csvDataRows = [];    

        // 1. Fetch CSV
        async function loadSpeakerData() {
            const dialect = document.getElementById('dialectFolder').value.trim();
            const speaker = document.getElementById('speakerId').value.trim();
            
            if (!dialect || !speaker) {
                alert("Provide target Dialect and Speaker ID.");
                return;
            }

            const csvPath = `TEXT/${dialect}/${speaker}/${speaker}.csv`;
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${csvPath}?ref=${BRANCH}`;

            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                
                if (!response.ok) throw new Error("Dataset file path missing or token invalid.");
                
                const json = await response.json();
                currentFileSha = json.sha; 
                
                const csvText = atob(json.content); 
                parseCSV(csvText, dialect, speaker);
                
                document.getElementById('currentSpeakerTitle').innerText = `Active Session: ${speaker}`;
                document.getElementById('workspace').classList.remove('hidden');
            } catch (err) {
                alert("Data read exception: " + err.message);
            }
        }

        // 2. Build Interactive Workspace Rows
        function parseCSV(text, dialect, speaker) {
            const lines = text.split('\n').filter(line => line.trim() !== '');
            const tableBody = document.getElementById('annotationTableBody');
            tableBody.innerHTML = "";
            csvDataRows = [];

            lines.forEach((line, index) => {
                const columns = line.split(','); 
                csvDataRows.push(columns);

                if (index === 0) return; // Keep headers out of editing lines

                const audioFileName = columns[0]; 
                const audioUrl = `https://${REPO_OWNER}.github.io/${REPO_NAME}/WAVS/${dialect}/${speaker}/${audioFileName}`;

                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition";
                row.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap text-sm font-semibold text-slate-700">${audioFileName}</td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <audio controls class="h-8 w-64 accent-indigo-600">
                            <source src="${audioUrl}" type="audio/wav">
                        </audio>
                    </td>
                    <td class="px-4 py-3 w-full">
                        <input type="text" value="${columns[1] || ''}" onchange="updateRowData(${index}, 1, this.value)" class="w-full border border-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 p-1.5 rounded-md text-sm text-slate-800 shadow-inner">
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <select onchange="updateRowData(${index}, 2, this.value)" class="border border-slate-200 p-1.5 rounded-md text-sm bg-white font-medium text-slate-700">
                            <option value="Verified" ${columns[2] === 'Verified' ? 'selected' : ''}>Verified ✅</option>
                            <option value="Needs Correction" ${columns[2] === 'Needs Correction' ? 'selected' : ''}>Fix Needed ⚠️</option>
                        </select>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function updateRowData(rowIndex, colIndex, value) {
            csvDataRows[rowIndex][colIndex] = value;
        }

        // 3. Write updates directly to Data Tree
        async function saveAndCommitChanges() {
            const dialect = document.getElementById('dialectFolder').value.trim();
            const speaker = document.getElementById('speakerId').value.trim();
            const csvPath = `TEXT/${dialect}/${speaker}/${speaker}.csv`;

            const updatedCsvContent = csvDataRows.map(row => row.join(',')).join('\n');
            const b64Content = btoa(unescape(encodeURIComponent(updatedCsvContent)));

            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${csvPath}`;
            
            const bodyData = {
                message: `Operator Inspection complete for dataset package: ${speaker}`,
                content: b64Content,
                sha: currentFileSha, 
                branch: BRANCH
            };

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bodyData)
                });

                if (response.ok) {
                    const resJson = await response.json();
                    currentFileSha = resJson.content.sha; 
                    alert("🚀 Core dataset file successfully verified and pushed to repository!");
                } else {
                    const errData = await response.json();
                    throw new Error(errData.message || "Push rejection.");
                }
            } catch (err) {
                alert("Save error encountered: " + err.message);
            }
        }
    </script>
</body>
</html>
